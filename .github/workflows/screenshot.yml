name: VedicHora Screenshot Tests

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - run: mkdir -p screenshots
      - name: Run screenshot tests
        run: npx playwright test e2e/screenshot.spec.js --reporter=list 2>&1 | tee screenshot-output.txt
        continue-on-error: true
        env:
          BASE_URL: https://vedichora-frontend-orcin.vercel.app
      - name: Push results
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy screenshot output
          cp screenshot-output.txt test-screenshots-output.txt 2>/dev/null || echo "no output" > test-screenshots-output.txt
          # Convert screenshots to base64 and save as text files (readable via API)
          mkdir -p test-screenshots
          for f in screenshots/*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .png)
            base64 -w 0 "$f" > "test-screenshots/${name}.b64"
            echo "Saved $name"
          done
          ls -la test-screenshots/ || true
          git add test-screenshots/ test-screenshots-output.txt || true
          git diff --staged --quiet || git commit -m "ci: screenshot test results [skip ci]"
          git push || true
