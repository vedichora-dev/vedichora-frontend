name: VedicHora Screenshot Tests
on:
  workflow_dispatch:
jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - run: mkdir -p screenshots
      - name: Run screenshot tests
        run: npx playwright test e2e/screenshot.spec.js --reporter=list 2>&1 | tee /tmp/ss-output.txt
        continue-on-error: true
        env:
          BASE_URL: https://vedichora-frontend-orcin.vercel.app
      - name: Upload screenshots
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/upload_screenshots.py
