name: VedicHora Screenshot Tests

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - run: mkdir -p test-screenshots
      - name: Run screenshot tests
        run: npx playwright test e2e/screenshot.spec.js --reporter=list 2>&1 | tee screenshot-output.txt
        continue-on-error: true
        env:
          BASE_URL: https://vedichora-frontend-orcin.vercel.app
      - name: Print playwright output
        if: always()
        run: cat screenshot-output.txt || true
      - name: Commit screenshots to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy screenshots to tracked folder
          mkdir -p test-screenshots
          cp screenshots/*.png test-screenshots/ 2>/dev/null || echo "No screenshots found"
          ls -la test-screenshots/ || true
          git add test-screenshots/ || true
          git diff --staged --quiet || git commit -m "ci: screenshot test results [skip ci]"
          git push || true
