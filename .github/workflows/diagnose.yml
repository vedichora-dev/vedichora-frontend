name: Diagnose Build Errors
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --legacy-peer-deps
      - name: Run build and show ALL errors
        run: |
          npx tsc --noEmit 2>&1 | head -100
          echo "---TSC DONE---"
          npm run build 2>&1 | grep -A5 -B2 "Type error\|error TS\|Cannot find\|Module not found\|Failed to compile" | head -80
          echo "---BUILD DONE---"
        continue-on-error: true
