name: Diagnose Build Errors
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Capture build errors
        run: npm run build 2>&1 | tail -80 > build-errors.txt || true
      - name: Commit
        run: |
          git config user.email "ci@vedichora.com"
          git config user.name "CI Bot"
          git add build-errors.txt
          git diff --staged --quiet || git commit -m "ci: build error log [skip ci]"
          git push || true
