name: Diagnose Build Errors
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Full build output
        run: npm run build 2>&1 | grep -E "Type error|error TS|Cannot find|Module not found|Syntax|Unexpected token" | head -30 || true
        continue-on-error: true
      - name: TSC check
        run: npx tsc --noEmit 2>&1 | head -40 || true
        continue-on-error: true
