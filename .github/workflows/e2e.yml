name: E2E Tests (Playwright)
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL'
        default: 'https://vedichora-frontend-orcin.vercel.app'
        required: false
  push:
    branches: [main]
    paths: ['src/**', 'e2e/**']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://vedichora-frontend-orcin.vercel.app' }}
          TEST_EMAIL: admin@vedichora.com
          TEST_PASSWORD: Admin@123
        run: |
          npx playwright test --reporter=list 2>&1 | tee e2e-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      - name: Print summary
        if: always()
        run: |
          echo "=== E2E RESULTS ==="
          grep -E "passed|failed|error|Match|Score|Koota|city|dropdown|appeared|âś“|âś—" e2e-output.txt | head -100 || true
      - name: Push results to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CONTENT=$(base64 -w 0 e2e-output.txt)
          EXISTING=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/contents/e2e-output.txt" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"test: e2e results $(date +%H%M) [skip ci]\",\"content\":\"$CONTENT\",\"sha\":\"$EXISTING\"}" \
              "https://api.github.com/repos/$REPO/contents/e2e-output.txt" > /dev/null
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"test: e2e results $(date +%H%M) [skip ci]\",\"content\":\"$CONTENT\"}" \
              "https://api.github.com/repos/$REPO/contents/e2e-output.txt" > /dev/null
          fi
          echo "Results pushed"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            e2e-output.txt
            test-results/
          retention-days: 7
