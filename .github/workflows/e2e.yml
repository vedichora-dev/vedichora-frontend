name: E2E Tests (Playwright)
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL'
        default: 'https://vedichora-frontend-orcin.vercel.app'
        required: false
  push:
    branches: [main]
    paths: ['src/**', 'e2e/**']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://vedichora-frontend-orcin.vercel.app' }}
          TEST_EMAIL: admin@vedichora.com
          TEST_PASSWORD: Admin@123
        run: |
          npx playwright test --reporter=list 2>&1 | tee e2e-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
      - name: Print summary
        if: always()
        run: |
          echo "=== E2E RESULTS ==="
          grep -E "passed|failed|error|✓|✗|PASS|FAIL" e2e-output.txt || cat e2e-output.txt | tail -30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            e2e-output.txt
            test-results/
            e2e-screenshots/
          retention-days: 7
