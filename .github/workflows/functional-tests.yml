name: Functional Test Results
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/app/chart/page.tsx','src/app/match/page.tsx','src/components/ui/CityAutocomplete.tsx']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps

      - name: Run functional tests
        env:
          BASE_URL: https://vedichora-frontend-orcin.vercel.app
        run: |
          npx playwright test e2e/functional-test.spec.js --reporter=list 2>&1 | tee /tmp/test-output.txt || true

      - name: Save results
        run: |
          echo "=== FUNCTIONAL TEST RESULTS ===" > e2e-test-results.txt
          echo "Timestamp: $(date)" >> e2e-test-results.txt
          echo "" >> e2e-test-results.txt
          cat /tmp/test-output.txt >> e2e-test-results.txt

      - name: Commit results
        run: |
          git config user.email "ci@vedichora.com"
          git config user.name "CI Bot"
          git add e2e-test-results.txt
          git diff --staged --quiet || git commit -m "test: functional test results $(date +%H:%M) [skip ci]"
          git push || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-test-results-${{ github.run_id }}
          path: |
            test-results/
            e2e-test-results.txt
          retention-days: 7
