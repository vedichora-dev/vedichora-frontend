name: Functional Test Results
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/app/chart/page.tsx','src/app/match/page.tsx','src/components/ui/CityAutocomplete.tsx']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --legacy-peer-deps
      - run: npx playwright install chromium --with-deps

      - name: Run tests and capture output
        env:
          BASE_URL: https://vedichora-frontend-orcin.vercel.app
        run: |
          # Run tests, capture ALL output including console.log
          npx playwright test e2e/functional-test.spec.js \
            --reporter=line \
            2>&1 | tee /tmp/test-raw.txt || true
          
          echo "## Functional Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test-raw.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Write results file
        run: |
          cp /tmp/test-raw.txt e2e-results.txt

      - name: Commit results file
        run: |
          git config user.email "ci@vedichora.com"
          git config user.name "CI Bot"
          git add e2e-results.txt
          git commit -m "test: functional results $(date +%Y%m%d-%H%M) [skip ci]" || echo "Nothing to commit"
          git push || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-screenshots-${{ github.run_id }}
          path: test-results/
          retention-days: 7
